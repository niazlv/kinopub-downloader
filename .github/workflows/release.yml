name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"

          GOOS=darwin  GOARCH=arm64 go build -ldflags="$LDFLAGS" -o kinopub-darwin-arm64  ./cmd/kinopub
          GOOS=darwin  GOARCH=amd64 go build -ldflags="$LDFLAGS" -o kinopub-darwin-amd64  ./cmd/kinopub
          GOOS=linux   GOARCH=amd64 go build -ldflags="$LDFLAGS" -o kinopub-linux-amd64   ./cmd/kinopub
          GOOS=linux   GOARCH=arm64 go build -ldflags="$LDFLAGS" -o kinopub-linux-arm64   ./cmd/kinopub
          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o kinopub-windows-amd64.exe ./cmd/kinopub

          # Архивы для Homebrew (требует .tar.gz)
          for bin in kinopub-darwin-arm64 kinopub-darwin-amd64 kinopub-linux-amd64 kinopub-linux-arm64; do
            tar -czf "${bin}.tar.gz" "$bin"
          done
          zip kinopub-windows-amd64.zip kinopub-windows-amd64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            kinopub-darwin-arm64
            kinopub-darwin-arm64.tar.gz
            kinopub-darwin-amd64
            kinopub-darwin-amd64.tar.gz
            kinopub-linux-amd64
            kinopub-linux-amd64.tar.gz
            kinopub-linux-arm64
            kinopub-linux-arm64.tar.gz
            kinopub-windows-amd64.exe
            kinopub-windows-amd64.zip
